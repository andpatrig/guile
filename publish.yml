# .github/workflows/publish.yml
#
# Publishes guile to PyPI whenever you push a version tag (e.g. v0.1.0).
#
# One-time setup:
#   1. Go to https://pypi.org → Account Settings → API tokens
#      Create a token scoped to the "guile" project.
#   2. In your GitHub repo → Settings → Secrets and variables → Actions
#      Add a secret named PYPI_API_TOKEN and paste the token value.
#
# To release:
#   1. Update version in pyproject.toml
#   2. git commit -am "release v0.1.1"
#   3. git tag v0.1.1
#   4. git push && git push --tags
#   This workflow fires automatically on the tag push.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # triggers on v0.1.0, v1.2.3, etc.

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: release       # optional: create a "release" environment in
                               # GitHub for extra approval gates

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
