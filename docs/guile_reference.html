<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guile — API Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

:root {
  --bg:         #f5f4f0;
  --surface:    #ffffff;
  --surface-2:  #f0efe9;
  --border:     #e2e0d8;
  --border-2:   #ccc9be;
  --text:       #1a1916;
  --text-2:     #6b6860;
  --text-3:     #9b9890;
  --accent:     #5b4fff;
  --accent-bg:  #eeecff;
  --accent-txt: #3b2ee0;
  --green:      #1a7a4a;
  --green-bg:   #e6f4ec;
  --amber:      #8a5a00;
  --amber-bg:   #fdf3dc;
  --red:        #c0392b;
  --red-bg:     #fdecea;
  --teal:       #0f6e6e;
  --teal-bg:    #e0f4f4;
  --mono:       'DM Mono', monospace;
  --sans:       'DM Sans', sans-serif;
  --r:          8px;
  --r-lg:       12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:         #141412;
    --surface:    #1e1d1a;
    --surface-2:  #252420;
    --border:     #2e2d28;
    --border-2:   #3a3932;
    --text:       #f0efe8;
    --text-2:     #9b9890;
    --text-3:     #6b6860;
    --accent:     #7b6fff;
    --accent-bg:  #1e1a3a;
    --accent-txt: #b0a8ff;
    --green:      #4ade80;
    --green-bg:   #0a2318;
    --amber:      #fbbf24;
    --amber-bg:   #1f1500;
    --red:        #f87171;
    --red-bg:     #1f0a0a;
    --teal:       #2dd4bf;
    --teal-bg:    #001f1f;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Shell ───────────────────────────────────────────────────────────── */
.shell { display: flex; min-height: 100vh; }

/* ── Sidebar ─────────────────────────────────────────────────────────── */
nav {
  width: 210px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 28px 0 40px;
  border-right: 1px solid var(--border);
  background: var(--surface);
}

.logo {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.logo-name {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.03em;
  color: var(--text);
}
.logo-name span { color: var(--accent); }
.logo-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 3px;
  font-family: var(--mono);
}

.nav-cat {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 14px 20px 5px;
}
.nav-cat:first-of-type { padding-top: 0; }

nav a {
  display: block;
  padding: 4px 20px;
  font-size: 12.5px;
  font-family: var(--mono);
  color: var(--text-2);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: all .1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
nav a:hover { color: var(--text); background: var(--surface-2); }
nav a.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: var(--accent-bg);
}

/* ── Main ────────────────────────────────────────────────────────────── */
main {
  flex: 1;
  padding: 52px 60px 80px;
  min-width: 0;
}

/* ── Category sections ───────────────────────────────────────────────── */
.cat-section { margin-bottom: 56px; }

.cat-heading {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ── Widget block ────────────────────────────────────────────────────── */
.widget {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  margin-bottom: 16px;
  overflow: hidden;
  scroll-margin-top: 24px;
}

.widget-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--surface);
}

.widget-sig {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.widget-sig .fn { color: var(--accent); }

.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 99px;
  flex-shrink: 0;
  white-space: nowrap;
}
.tag-layout { background: var(--accent-bg); color: var(--accent-txt); }
.tag-text   { background: var(--green-bg);  color: var(--green); }
.tag-input  { background: var(--amber-bg);  color: var(--amber); }
.tag-media  { background: var(--red-bg);    color: var(--red); }
.tag-data   { background: var(--teal-bg);   color: var(--teal); }
.tag-state  { background: var(--accent-bg); color: var(--accent-txt); }

.widget-body {
  border-top: 1px solid var(--border);
  padding: 18px;
}

.desc {
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 16px;
  line-height: 1.65;
  max-width: 680px;
}

/* Args table */
.args-wrap {
  overflow-x: auto;
  margin-bottom: 16px;
  border-radius: var(--r);
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
th {
  text-align: left;
  color: var(--text-3);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 8px 12px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 8px 12px;
  vertical-align: top;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
tr:last-child td { border-bottom: none; }
td:first-child {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  white-space: nowrap;
}
td:nth-child(2) {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--text-3);
  white-space: nowrap;
}
td:nth-child(3) { color: var(--text-2); }

/* Code example */
.ex-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 6px;
}
pre {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text);
  overflow-x: auto;
  white-space: pre;
}

/* ── Scrollbar ───────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
</style>
</head>
<body>
<div class="shell">

<nav id="sidebar">
  <div class="logo">
    <div class="logo-name">gui<span>le</span></div>
    <div class="logo-sub">API reference v0.1</div>
  </div>
  <div id="nav-links"></div>
</nav>

<main id="main"></main>

function build() {
  const cats = [...new Set(WIDGETS.map(w => w.cat))];

  // ── Sidebar ─────────────────────────────────────────────────────────
  const nav = document.getElementById("nav-links");
  nav.innerHTML = cats.map(cat => {
    const ws = WIDGETS.filter(w => w.cat === cat);
    return `<div class="nav-cat">${cat}</div>` +
      ws.map(w =>
        `<a href="#w-${w.id}" data-id="${w.id}">${w.name}</a>`
      ).join("");
  }).join("");

  // ── Main content ────────────────────────────────────────────────────
  const main = document.getElementById("main");
  main.innerHTML = cats.map(cat => {
    const ws = WIDGETS.filter(w => w.cat === cat);
    const blocks = ws.map(w => {
      const rows = w.args.map(([a,t,d]) =>
        `<tr><td>${a}</td><td>${t}</td><td>${d}</td></tr>`
      ).join("");
      return `
        <div class="widget" id="w-${w.id}">
          <div class="widget-head">
            <span class="widget-sig"><span class="fn">${w.name}</span></span>
            <span class="tag ${TAG_CLASSES[w.tag]}">${TAG_LABELS[w.tag]}</span>
          </div>
          <div class="widget-body">
            <p class="desc">${w.desc}</p>
            <div class="args-wrap">
              <table>
                <thead>
                  <tr><th>argument</th><th>type / default</th><th>description</th></tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
            <div class="ex-label">Example</div>
            <pre class="ex-code"></pre>
          </div>
        </div>`;
    }).join("");
    return `<div class="cat-section">
      <div class="cat-heading">${cat}</div>
      ${blocks}
    </div>`;
  }).join("");
}

// Active nav on scroll
function initObserver() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));
        const a = document.querySelector(`nav a[data-id="${e.target.id.replace("w-","")}"]`);
        if (a) {
          a.classList.add("active");
          a.scrollIntoView({block:"nearest"});
        }
      }
    });
  }, {rootMargin:"-10% 0px -80% 0px"});

  document.querySelectorAll(".widget").forEach(el => io.observe(el));
}
